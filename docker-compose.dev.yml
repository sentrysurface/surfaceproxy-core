services:
  # SurfaceProxy core engine
  surface-proxy:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: surface-proxy
    restart: unless-stopped
    ports:
      - "8443:8443"   # CDP Proxy endpoint
      - "8080:8080"   # Dashboard UI
    volumes:
      - ./surface-proxy.json:/app/surface-proxy.json:ro
    environment:
      - SURFACE_PROXY_CONFIG=/app/surface-proxy.json
    depends_on:
      chrome:
        condition: service_healthy
    networks:
      - proxy-net

  # Headless Chrome (use this if browser.mode = "external" in config)
  # With browser.mode = "auto", surface-proxy manages Chrome itself — this service is optional.
  chrome:
    image: zenika/alpine-chrome:124
    container_name: surface-proxy-chrome
    command: >
      --headless=new
      --remote-debugging-address=0.0.0.0
      --remote-debugging-port=9222
      --no-sandbox
      --disable-gpu
      --disable-dev-shm-usage
      --disable-software-rasterizer
      --no-first-run
      --no-default-browser-check
    ports:
      - "9222:9222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9222/json/version"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - proxy-net

networks:
  proxy-net:
    driver: bridge
